<!DOCTYPE html>
<html>
<head>
    <title>Gallery - ELITE</title>
    <link rel="stylesheet" href="gallery.css">
</head>

<body>

<header>
    <h1>ELITE</h1>

    <nav>
        <a href="index.html">HOME</a>
        <a href="gallery.html">GALLERY</a>
        <a href="services.html">SERVICES</a>
        <a href="book.html" class="btn">BOOK NOW</a>
    </nav>
</header>

<section class="gallery-header">
    <p class="sub-title">Sweet Memories</p>
    <h2>OUR CAPTURED MOMENTS</h2>

    <div class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="food">Food</button>
        <button data-filter="decor">Decor</button>
        <button data-filter="hospitality">Hospitality</button>
    </div>
</section>

<section class="gallery">
    <div class="item" data-category="decor"><img src="images/event1.jpg"></div>
    <div class="item" data-category="decor"><img src="images/event2.jpg"></div>
    <div class="item" data-category="decor"><img src="images/event3.jpg"></div>
    <div class="item" data-category="decor"><img src="images/event4.jpg"></div>
    <div class="item" data-category="food"><img src="images/event5.jpg"></div>
    <div class="item" data-category="hospitality"><img src="images/event6.jpg"></div>
    <div class="item" data-category="hospitality"><img src="images/event7.jpg"></div>
    <div class="item" data-category="food"><img src="images/event8.jpg"></div>
</section>

<script>
const buttons = document.querySelectorAll(".filters button");
const items = document.querySelectorAll(".item");

buttons.forEach(button => {
    button.addEventListener("click", () => {

        buttons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");

        const filter = button.getAttribute("data-filter");

        items.forEach(item => {
            if (filter === "all" || item.getAttribute("data-category") === filter) {
                item.style.display = "block";
                setTimeout(() => item.style.opacity = "1", 10);
            } else {
                item.style.opacity = "0";
                setTimeout(() => item.style.display = "none", 300);
            }
        });

    });
});
</script>

</body>
</html>
